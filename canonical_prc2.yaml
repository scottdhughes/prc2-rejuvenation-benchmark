title: "Rejuvenation or Stress Artifact? A Self-Verifying Benchmark for PRC2-Linked Epigenetic Fidelity"
abstract: >
  PRC2 Rejuvenation Benchmark is an offline, leakage-clean benchmark for
  determining whether frozen aging and intervention signatures behave like
  coherent PRC2-linked epigenetic fidelity loss, coherent PRC2-linked
  restoration, mixed biology, confounded biology, or insufficiently covered
  inputs, with additive fixed-rule source-family transfer evaluation.
contract_version: "2026-03-29.prc2-v1"

runtime:
  pythonhashseed: 0
  random_seed: 7
  verification_tolerance: 1.0e-9

